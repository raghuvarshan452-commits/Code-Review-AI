kind = "web"
previewPath = "/"
title = "ReviewBot AI"
version = "1.0.0"
id = "artifacts/reviewbot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21214

[services.development]
run = "pnpm --filter @workspace/reviewbot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reviewbot", "run", "build" ]
publicDir = "artifacts/reviewbot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21214"
BASE_PATH = "/"
